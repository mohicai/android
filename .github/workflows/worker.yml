name: Debug Android Emulator in Web

on: [push, workflow_dispatch] # 允许手动触发

jobs:
  web-vnc-debug:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 1. 开启 KVM 硬件加速
    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # 2. 原生安装 XFCE 桌面、VNC 和 noVNC
    - name: Install Desktop Environment and noVNC
      run: |
        sudo apt-get update
        # 安装轻量级桌面和 VNC 服务（减少内存占用）
        sudo apt-get install -y xfce4 xfce4-goodies tigervnc-standalone-server novnc websockify
        
        # 配置 VNC 密码 (这里设置密码为 "vncpasswd"，你可以自行修改)
        mkdir -p ~/.vnc
        echo "vncpasswd" | vncpasswd -f > ~/.vnc/passwd
        chmod 600 ~/.vnc/passwd
        
        # 启动 VNC 服务在 :1 端口（实际对应 5901）
        vncserver :1 -geometry 1280x800 -depth 24
        
        # 启动 noVNC 网页服务，将 5901 端口转换为 6080 网页端口
        # 使用 & 让它在后台运行
        /usr/share/novnc/utils/launch.sh --vnc localhost:5901 --listen 6080 &

    - name: ZeroTier
      uses: zerotier/github-action@v1.0.1
      with:
        network_id: 93afae5963172da4
        
    # 4. 在这个桌面环境里启动安卓模拟器
    - name: Run Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        # 注意：这里不能加 -no-window，必须让模拟器把画面渲染到刚才创建的虚拟桌面里
        emulator-options: -no-audio -no-boot-anim
        script: |
          echo "模拟器已在虚拟桌面中启动！"
          echo "流水线将保持运行 15 分钟供你在线调试..."
          sleep 900