name: Remote ADB Android Emulator

on: [push, workflow_dispatch]

jobs:
  remote-adb-debug:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 开启 KVM 硬件加速
    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # 2. 接入你的 ZeroTier 私有网络
    - name: ZeroTier
      uses: zerotier/github-action@v1.0.1
      with:
        network_id: 93afae5963172da4

    # 3. 打印 GitHub 虚拟机的 ZeroTier 内网 IP
    - name: Get ZeroTier IP
      run: |
        echo "=========================================================="
        echo "当前虚拟机的 ZeroTier 状态："
        sudo zerotier-cli listnetworks
        echo "=========================================================="

    # 4. 用纯脚本在后台创建并启动模拟器，手动等待其上线
    - name: Custom Run Android Emulator (Pure Script)
      run: |
        # 1. 临时彻底关闭 Ubuntu 的系统防火墙，防止 5555 端口被拦截
        sudo ufw disable || true
        
        # 2. 配置 Android SDK 环境变量
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH
        
        # 3. 自动接受所有 SDK 协议组件
        yes | sdkmanager --licenses > /dev/null
        
        # 4. 下载并创建一个干净的 AVD 模拟器
        echo "正在创建 AVD 模拟器..."
        sdkmanager "system-images;android-30;google_apis;x86_64" > /dev/null
        echo "no" | avdmanager create avd -n cloud_emulator -k "system-images;android-30;google_apis;x86_64" --device "Nexus 6" --force
        
        # 5. 在后台启动模拟器
        echo "正在后台拉起模拟器..."
        emulator -avd cloud_emulator -no-window -no-audio -no-boot-anim -gpu swiftshader > /dev/null 2>&1 &
        
        # 6. 优雅地等待 adb 上线
        echo "正在等待模拟器 ADB 建立连接 (wait-for-device)..."
        adb wait-for-device
        echo "🎉 adb 已成功识别到设备！开始监控系统引导状态..."
        
        # 7. 循环检测 Android 系统桌面是否彻底加载完毕
        BOOT_COMPLETED=""
        while [ "$BOOT_COMPLETED" != "1" ]; do
          sleep 5
          BOOT_COMPLETED=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
          echo "等待 Android 系统彻底完成引导中..."
        done
        
        echo "=========================================================="
        echo "🔥 模拟器完全开机成功！正在配置远程监听端口..."
        echo "=========================================================="
        
        # 【核心修复】：重启 adb 进程并强制它监听 0.0.0.0（所有网卡接口）
        adb kill-server
        export ADBHOST=0.0.0.0
        adb -a nodaemon server start > /dev/null 2>&1 &
        sleep 3
        
        # 再次确认模拟器在内部被正确识别，并开启 5555
        adb tcpip 5555
        
        echo "=========================================================="
        echo "本地电脑请在终端执行: adb connect 172.27.253.225:5555"
        echo "=========================================================="
        
        # 留出 15 分钟供你连接和调试
        sleep 900