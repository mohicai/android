name: Remote ADB Android Emulator

on: [push, workflow_dispatch]

jobs:
  remote-adb-debug:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 开启 KVM 硬件加速（必须开启，否则模拟器无法建立 adb 端口）
    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # 2. 接入你的 ZeroTier 私有网络
    - name: ZeroTier
      uses: zerotier/github-action@v1.0.1
      with:
        network_id: 93afae5963172da4

    # 3. 打印 GitHub 虚拟机的 ZeroTier 内网 IP
    - name: Get ZeroTier IP
      run: |
        echo "=========================================================="
        echo "当前虚拟机的 ZeroTier 状态："
        sudo zerotier-cli listnetworks
        echo "=========================================================="

    # 4. 在后台启动纯无界面（Headless）安卓模拟器
    - name: Run Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        # -no-window 彻底关闭图形界面渲染，纯后台 adb 运行，极大节省云端资源
        emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader
        script: |
          # 允许 adb 监听所有网络接口（而不仅仅是 localhost），以便远程电脑连接
          adb tcpip 5555
          
          echo "=========================================================="
          echo "模拟器 adb 远程连接端口 5555 已在后台开放！"
          echo "请在本地电脑上打开终端执行以下命令进行连接："
          echo "adb connect <上面步骤获取到的ZeroTier_IP>:5555"
          echo "=========================================================="
          
          # 保持流水线运行 15 分钟供你本地 adb 调试
          sleep 900