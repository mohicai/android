name: Debug Android Emulator in Web

on: [push, workflow_dispatch]

jobs:
  web-vnc-debug:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 1. 开启 KVM 硬件加速
    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # 2. 原生安装 XFCE 桌面、VNC 和 noVNC
    - name: Install Desktop Environment and noVNC
      run: |
        sudo apt-get update
        sudo apt-get install -y xfce4 xfce4-goodies tigervnc-standalone-server novnc websockify
        
        # 配置 VNC 密码
        mkdir -p ~/.vnc
        echo "vncpasswd" | vncpasswd -f > ~/.vnc/passwd
        chmod 600 ~/.vnc/passwd
        
        # 启动 VNC 服务在 :1 端口（对应 5901）
        vncserver :1 -geometry 1280x800 -depth 24
        
        # 启动 noVNC 网页服务，监听 6080 端口
        /usr/share/novnc/utils/launch.sh --vnc localhost:5901 --listen 6080 &

    - name: ZeroTier
      uses: zerotier/github-action@v1.0.1
      with:
        network_id: 93afae5963172da4

    # 4. 在这个桌面环境里启动安卓模拟器
    - name: Run Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      # 【核心改动 1】：强制将这一步的所有进程绑定到 VNC 的 :1 号虚拟显示器
      env:
        DISPLAY: :1
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        # 【核心改动 2】：增加 -gpu swiftshader，强制使用 CPU 软件渲染（云端虚拟机没有物理显卡，不加这个极易崩溃）
        emulator-options: -no-audio -no-boot-anim -gpu swiftshader
        script: |
          echo "=========================================================="
          echo "模拟器成功在虚拟桌面中启动并完成引导！"
          echo "你可以通过 ZeroTier 访问该虚拟机的 6080 端口查看网页画面。"
          echo "网页访问地址类似于: http://<你的GitHub_Runner_ZeroTier_IP>:6080/vnc.html"
          echo "VNC 密码为: vncpasswd"
          echo "=========================================================="
          # 保持连接 15 分钟供你在线操作
          sleep 900
